<!doctype html>
<html lang="en">

<head>
  <base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="Description" content="Demonstration for instagram-card">

  <style>
    :root, html, body {
      margin: var(--ddd-spacing-0);
      padding: var(--ddd-spacing-0);
      background-color: #f3f3f3;
    }

    #demo {
      margin: var(--ddd-spacing-2);
    }

    instagram-card {
      margin: var(--ddd-spacing-2);
      display: block;
    }

    instagram-card:hover {
      box-shadow: var(--ddd-boxShadow-sm);
    }

    #example {
      --instagram-card-font-size: var(--ddd-font-size-l);
      background-color: var(--ddd-accent-2);
      color: var(--ddd-primary-17);
    }

    #follow-the-white-rabbit {
      display: none;
    }
  </style>
  <title>instagram-card</title>
</head>

<body>
  <div id="demo">
    <instagram-card
      id="example"
      title="Instagram Card">
    </instagram-card>
  </div>

  <script type="module" src="./instagram-card.js"></script>

  <details id="follow-the-white-rabbit" open>
    <summary>How to Develop</summary>
    <div class="content">
      <p>
        <strong>Checkout project on github:</strong>
        <a href="https://github.com/Jake Butler/instagram-card" target="_blank" rel="nofollow">
          Jake Butler/instagram-card
        </a>
      </p>
    </div>
  </details>
</body>
</html>
